server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location ^~ /assets/ {
        try_files $uri @static_not_found;
    }

    location ~* \.(?:avif|css|eot|gif|ico|jpe?g|js|json|map|mjs|otf|png|svg|ttf|txt|wasm|webp|woff2?|xml)$ {
        try_files $uri @static_not_found;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location @static_not_found {
        default_type text/plain;
        return 404 "Not found\n";
    }
}
