services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - hello-app-fork-db:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      PORT: "18081"
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: app
      PGUSER: app
      PGPASSWORD: app
      PGSSLMODE: disable
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web

  gateway:
    image: nginxinc/nginx-unprivileged:1.29-alpine
    depends_on:
      - api
      - web
    ports:
      - "18080:8080"
    volumes:
      - ./deploy/preview/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  hello-app-fork-db:
