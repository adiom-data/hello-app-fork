apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-app-fork
spec:
  parentRefs:
    - name: public
      namespace: platform-ingress
  hostnames:
    - t-testuser.infrapad.ai
    - app.adiom.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: hello-app-fork-api
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hello-app-fork-web
          port: 80
