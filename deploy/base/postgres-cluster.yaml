apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: hello-app-fork-db
  labels:
    app.kubernetes.io/name: hello-app-fork-db
    app.kubernetes.io/part-of: hello-app-fork
spec:
  instances: 1
  bootstrap:
    initdb:
      database: app
      owner: app
  storage:
    size: 1Gi
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
