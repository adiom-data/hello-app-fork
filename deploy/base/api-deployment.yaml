apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app-fork-api
  labels:
    app.kubernetes.io/name: hello-app-fork-api
    app.kubernetes.io/part-of: hello-app-fork
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hello-app-fork-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hello-app-fork-api
        app.kubernetes.io/part-of: hello-app-fork
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              until pg_isready -h "$PGHOST" -p "$PGPORT" -d "$PGDATABASE" -U "$PGUSER"; do
                sleep 2
              done
          env:
            - name: PGHOST
              value: hello-app-fork-db-rw
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: app
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: hello-app-fork-db-app
                  key: username
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 70
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: api
          image: ghcr.io/adiom-data/hello-app-fork-api:latest
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "18081"
            - name: PGHOST
              value: hello-app-fork-db-rw
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: app
            - name: PGSSLMODE
              value: disable
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: hello-app-fork-db-app
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: hello-app-fork-db-app
                  key: password
          ports:
            - name: http
              containerPort: 18081
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
